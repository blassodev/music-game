name: Build and Deploy

on:
  push:
    branches: [main]

env:
  SSH_AUTH_SOCK: /tmp/ssh_agent.sock

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Debug secrets
        env:
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          echo "=== DEBUG SECRETS ==="
          echo "DEPLOY_HOST: $DEPLOY_HOST"
          echo "SSH_PASSPHRASE length: ${#SSH_PASSPHRASE}"
          echo "SSH_PRIVATE_KEY length: ${#SSH_PRIVATE_KEY}"
          echo "SSH_PRIVATE_KEY first line: $(echo "$SSH_PRIVATE_KEY" | head -1)"
          echo "=== END DEBUG ==="

      - name: Setup SSH
        env:
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          ssh-agent -a $SSH_AUTH_SOCK > /dev/null
          echo 'echo $SSH_PASSPHRASE' > ~/.ssh_askpass && chmod +x ~/.ssh_askpass
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | DISPLAY=None SSH_ASKPASS=~/.ssh_askpass ssh-add - 2>&1
          ssh-add -l

      - name: Deploy to server
        run: |
          ssh -o StrictHostKeyChecking=no formacion@38.242.196.69 "
            cd /opt/music-game &&
            git pull origin main &&
            docker build -t music-game:latest . &&
            docker compose up -d &&
            docker system prune -f
          "
