name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH and Deploy
        env:
          SSH_PASSPHRASE: ${{ secrets.SSH_PASSPHRASE }}
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          eval $(ssh-agent -s)
          echo 'echo $SSH_PASSPHRASE' > ~/.ssh_askpass && chmod +x ~/.ssh_askpass
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | DISPLAY=None SSH_ASKPASS=~/.ssh_askpass ssh-add - 2>&1
          echo "=== KEYS LOADED ==="
          ssh-add -l
          echo "=== SSH VERBOSE ==="
          ssh -vvv -o StrictHostKeyChecking=no formacion@38.242.196.69 "echo connected" 2>&1 | grep -E "debug1: (Auth|offer|Trying|Next|identity|pubkey)" | head -30
