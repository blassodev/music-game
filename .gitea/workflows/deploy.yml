name: Build and Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH and Deploy
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          echo "=== KEY LENGTH: ${#SSH_PRIVATE_KEY} ==="
          echo "=== KEY FIRST LINE: $(echo "$SSH_PRIVATE_KEY" | head -1) ==="
          echo "=== TESTING SSH ==="
          ssh -vvv -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key formacion@38.242.196.69 "echo connected" 2>&1 | grep -E "debug1: (Auth|offer|Trying|Next|identity|pubkey|Server)" | head -20