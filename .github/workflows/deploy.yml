jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase repository owner
        id: owner
        run: echo "lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Encode docker-compose.yml
        id: compose
        run: |
          COMPOSE_B64=$(base64 -w 0 docker-compose.yml)
          echo "b64=$COMPOSE_B64" >> "$GITHUB_OUTPUT"

      - name: Deploy to server via Cloudflare SSH
        uses: and-fm/cloudflared-ssh-action@v3
        with:
          host: ${{ secrets.SSH_HOST }}
          port: 22
          username: formacion
          private_key_filename: deploy_key
          private_key_value: ${{ secrets.SSH_PRIVATE_KEY }}
          service_token_id: ${{ secrets.CF_ACCESS_CLIENT_ID }}
          service_token_secret: ${{ secrets.CF_ACCESS_CLIENT_SECRET }}
          commands: |
            set -e
            mkdir -p ~/music-game
            echo "${{ steps.compose.outputs.b64 }}" | base64 -d > ~/music-game/docker-compose.yml
            cd ~/music-game
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.repository_owner }} --password-stdin
            docker pull ${{ env.REGISTRY }}/${{ steps.owner.outputs.lc }}/${{ env.IMAGE_NAME }}:latest
            docker compose up -d
            docker system prune -f
